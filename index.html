<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI ကိုယ်ရည်ကိုယ်သွေး စစ်ဆေးခြင်း</title>
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #121212;
            --card-bg: rgba(30, 30, 30, 0.95);
            --accent-color: #ffffff;
            --text-main: #ffffff;
            --text-muted: #cccccc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Padauk', sans-serif; }

        body {
            min-height: 100vh;
            background-color: var(--primary-bg);
            background-image: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            background-attachment: fixed;
            padding: 20px;
            color: var(--text-main);
            line-height: 1.8;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 650px; }

        .header { text-align: center; margin-bottom: 25px; padding: 10px; }
        .header h1 { font-size: 1.8rem; font-weight: 700; color: var(--accent-color); }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        /* မိုဘိုင်းဖုန်းအတွက် စာသားအရွယ်အစား ချိန်ညှိချက် */
        @media (max-width: 480px) {
            .glass-card { padding: 20px; }
            .header h1 { font-size: 1.5rem; }
            .question-text { font-size: 1.3rem !important; }
            .option-btn { font-size: 1rem !important; }
        }

        .progress-bar { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.4s ease; }

        .question-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 25px; color: #fff; text-align: left; line-height: 1.5; }

        .options { display: flex; flex-direction: column; gap: 15px; }

        .option-btn {
            padding: 18px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            text-align: left;
            font-weight: 400;
        }

        .option-btn:hover, .option-btn:active {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
            transform: scale(1.02);
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .hidden { display: none; }

        .result-type { font-size: 4rem; font-weight: 800; margin: 10px 0; letter-spacing: 5px; }
        .result-name { font-size: 1.5rem; color: #ffd700; margin-bottom: 15px; }
        
        .dim-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .dim-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MBTI ကိုယ်ရည်ကိုယ်သွေး စစ်ဆေးခြင်း</h1>
        </div>

        <div class="glass-card" id="startScreen">
            <h2 style="margin-bottom: 15px;">မင်္ဂလာပါ</h2>
            <p style="margin-bottom: 25px; color: var(--text-muted);">
                ဤစစ်ဆေးမှုသည် သင့်အား ပိုမိုနားလည်စေရန် ကူညီပေးပါလိမ့်မည်။ 
                မေးခွန်း ၂၀ ပါဝင်ပြီး ၅ မိနစ်ခန့် ကြာမြင့်ပါမည်။
                <strong>မိမိဖြစ်ချင်သည့် ပုံစံမျိုးထက် လက်ရှိအရှိအတိုင်း ခံစားရသော အဖြေကိုသာ</strong> ရွေးချယ်ပေးပါ။
            </p>
            <button class="btn-action" onclick="startTest()">စစ်ဆေးမှု စတင်ရန်</button>
        </div>

        <div class="glass-card hidden" id="quizScreen">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div id="questionNumber" style="font-weight: bold; margin-bottom: 10px; color: var(--text-muted);"></div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
        </div>

        <div class="glass-card hidden" id="resultsScreen" style="text-align: center;">
            <p>သင့်ရဲ့ ကိုယ်ရည်ကိုယ်သွေး အမျိုးအစားမှာ</p>
            <div class="result-type" id="mbtiType"></div>
            <div class="result-name" id="typeName"></div>
            <p id="typeDescription" style="text-align: justify; font-size: 1.1rem;"></p>
            <div class="dim-grid" id="dimensionsContainer"></div>
            <button class="btn-action" onclick="location.reload()" style="margin-top: 25px;">ပြန်လည်စစ်ဆေးရန်</button>
        </div>
    </div>

    <script>
        const questions = [
            // E vs I
            { text: "လူမှုရေးပွဲတစ်ခုမှာ သင်ဟာ -", options: [
                { text: "လူအများနဲ့ ရောနှောစကားပြောရတာကို စွမ်းအင်တက်ကြွစေတယ်", score: { E: 2, I: 0 } },
                { text: "ရင်းနှီးပြီးသား လူအနည်းငယ်နဲ့ပဲ အချိန်ဖြုန်းရတာကို ပိုနှစ်သက်တယ်", score: { E: 0, I: 2 } }
            ]},
            { text: "အလုပ်တွေအရမ်းများပြီး စိတ်ပင်ပန်းတဲ့အခါ -", options: [
                { text: "သူငယ်ချင်းတွေနဲ့ ဆုံတွေ့ပြီး အာရုံပြောင်းလိုက်မှ နေသာထိုင်သာရှိတယ်", score: { E: 2, I: 0 } },
                { text: "တိတ်ဆိတ်တဲ့နေရာမှာ တစ်ယောက်တည်း အနားယူမှ စွမ်းအင်ပြန်ပြည့်တယ်", score: { E: 0, I: 2 } }
            ]},
            { text: "အလုပ်တစ်ခုလုပ်ရင် သင်ဟာ -", options: [
                { text: "အဖွဲ့လိုက် တိုင်ပင်ဆွေးနွေးပြီး လုပ်ရတာ ပိုထိရောက်တယ်လို့ ထင်တယ်", score: { E: 2, I: 0 } },
                { text: "ကိုယ်တိုင် အာရုံစိုက်ပြီး တစ်ယောက်တည်း လုပ်ရတာကို ပိုသဘောကျတယ်", score: { E: 0, I: 2 } }
            ]},
            { text: "အားလပ်ရက်မှာ သင်ဟာ -", options: [
                { text: "အပြင်ထွက်ပြီး လူမှုပတ်ဝန်းကျင်နဲ့ ထိတွေ့ရတာကို ပိုကြိုက်တယ်", score: { E: 2, I: 0 } },
                { text: "အိမ်မှာပဲ အေးအေးဆေးဆေး စာဖတ်၊ ရုပ်ရှင်ကြည့်ရတာကို ပိုကြိုက်တယ်", score: { E: 0, I: 2 } }
            ]},
            { text: "လူသစ်တွေနဲ့ တွေ့တဲ့အခါ -", options: [
                { text: "စကားစပြောဖို့ လွယ်ကူပြီး ပွင့်လင်းစွာ ဆက်ဆံတတ်တယ်", score: { E: 2, I: 0 } },
                { text: "ခပ်တန်းတန်းနေပြီး ရင်းနှီးဖို့ အချိန်တစ်ခုယူရလေ့ရှိတယ်", score: { E: 0, I: 2 } }
            ]},
            // S vs N
            { text: "သင်ဟာ အရာရာကို ကြည့်တဲ့အခါ -", options: [
                { text: "လက်တွေ့ကျကျ အချက်အလက်နဲ့ လက်ရှိအခြေအနေကိုပဲ ကြည့်တယ်", score: { S: 2, N: 0 } },
                { text: "အနာဂတ်ဖြစ်နိုင်ချေတွေနဲ့ ခြုံငုံသုံးသပ်ရတဲ့ စိတ်ကူးတွေကို ပိုကြည့်တယ်", score: { S: 0, N: 2 } }
            ]},
            { text: "အလုပ်တစ်ခု သင်ယူတဲ့အခါ -", options: [
                { text: "အဆင့်ဆင့် ဘယ်လိုလုပ်ရမလဲဆိုတဲ့ လက်တွေ့ညွှန်ကြားချက်ကို လိုချင်တယ်", score: { S: 2, N: 0 } },
                { text: "ဘာကြောင့် လုပ်ရတာလဲဆိုတဲ့ သဘောတရားနဲ့ မူဘောင်ကို အရင်သိချင်တယ်", score: { S: 0, N: 2 } }
            ]},
            { text: "သင်ဟာ ဘယ်လိုလူမျိုးလို့ ထင်သလဲ -", options: [
                { text: "အသေးစိတ်အချက်အလက်တွေကို မှတ်မိပြီး တိကျသေချာတဲ့လူ", score: { S: 2, N: 0 } },
                { text: "တီထွင်ကြံဆတတ်ပြီး စိတ်ကူးယဉ် အိုင်ဒီယာအသစ်တွေ ထုတ်တတ်တဲ့လူ", score: { S: 0, N: 2 } }
            ]},
            { text: "ပြဿနာတစ်ခု ကြုံတဲ့အခါ -", options: [
                { text: "ယခင်က သုံးဖူးတဲ့ အောင်မြင်တဲ့ နည်းလမ်းဟောင်းတွေကိုပဲ သုံးတယ်", score: { S: 2, N: 0 } },
                { text: "နည်းလမ်းအသစ်တွေကို စမ်းသပ်ကြည့်ဖို့ ဝန်မလေးဘူး", score: { S: 0, N: 2 } }
            ]},
            { text: "စကားပြောတဲ့အခါ သင်ဟာ -", options: [
                { text: "တိုက်ရိုက်နဲ့ တိကျတဲ့ အဓိပ္ပာယ်ကိုပဲ သုံးနှုန်းပြောဆိုတယ်", score: { S: 2, N: 0 } },
                { text: "ဥပမာတွေ၊ တင်စားချက်တွေ သုံးပြီး ပြောရတာကို ပိုနှစ်သက်တယ်", score: { S: 0, N: 2 } }
            ]},
            // T vs F
            { text: "ဆုံးဖြတ်ချက်ချတဲ့အခါ -", options: [
                { text: "ယုတ္တိဗေဒ (Logic) နဲ့ အမှန်တရားကိုပဲ အခြေခံတယ်", score: { T: 2, F: 0 } },
                { text: "လူမှုရေးနဲ့ တစ်ဖက်လူရဲ့ ခံစားချက်ကိုပါ ထည့်သွင်းစဉ်းစားတယ်", score: { T: 0, F: 2 } }
            ]},
            { text: "ဝေဖန်မှုပေးတဲ့အခါ -", options: [
                { text: "ရိုးသားပြီး ပွင့်လင်းတဲ့ အမှန်တရားကိုပဲ တိုက်ရိုက်ပြောတယ်", score: { T: 2, F: 0 } },
                { text: "တစ်ဖက်လူ စိတ်မထိခိုက်အောင် စကားလုံးကို ညှိနှိုင်းပြောဆိုတယ်", score: { T: 0, F: 2 } }
            ]},
            { text: "အငြင်းပွားမှုတစ်ခုမှာ သင်ဟာ -", options: [
                { text: "ဘယ်သူမှန်တယ်ဆိုတဲ့ အချက်အလက်ကိုပဲ အဓိကထား ငြင်းခုံတယ်", score: { T: 2, F: 0 } },
                { text: "နှစ်ဦးနှစ်ဖက် ပြေလည်သွားဖို့နဲ့ သဟဇာတဖြစ်ဖို့ကိုပဲ အဓိကထားတယ်", score: { T: 0, F: 2 } }
            ]},
            { text: "အလုပ်မှာ လူတွေကို စီမံတဲ့အခါ -", options: [
                { text: "စွမ်းဆောင်ရည်နဲ့ စံနှုန်းတွေကို တိတိကျကျ သတ်မှတ်တယ်", score: { T: 2, F: 0 } },
                { text: "ဝန်ထမ်းတွေရဲ့ လိုအပ်ချက်နဲ့ စိတ်ဓာတ်ပိုင်းဆိုင်ရာကို ဦးစားပေးတယ်", score: { T: 0, F: 2 } }
            ]},
            { text: "သင်ဟာ ဘယ်အရာကို ပိုတန်ဖိုးထားသလဲ -", options: [
                { text: "တရားမျှတမှုနဲ့ မှန်ကန်တဲ့ မူဝါဒ", score: { T: 2, F: 0 } },
                { text: "ကြင်နာသနားမှုနဲ့ ညီညွတ်တဲ့ ဆက်ဆံရေး", score: { T: 0, F: 2 } }
            ]},
            // J vs P
            { text: "ခရီးသွားဖို့ ပြင်ဆင်တဲ့အခါ -", options: [
                { text: "သွားမယ့်နေရာနဲ့ အချိန်ဇယားကို ကြိုတင်စနစ်တကျ စီစဉ်တယ်", score: { J: 2, P: 0 } },
                { text: "ကြိုမစီစဉ်ဘဲ ရောက်တဲ့အခါကျမှ အဆင်ပြေသလို သွားလာတယ်", score: { J: 0, P: 2 } }
            ]},
            { text: "အလုပ်တစ်ခု လုပ်ရတော့မယ်ဆိုရင် -", options: [
                { text: "သတ်မှတ်ရက်ထက် စောပြီး ပြီးစီးအောင် လုပ်လေ့ရှိတယ်", score: { J: 2, P: 0 } },
                { text: "နောက်ဆုံးအချိန် (Deadline) နားနီးမှပဲ အရှိန်မြှင့်လုပ်လေ့ရှိတယ်", score: { J: 0, P: 2 } }
            ]},
            { text: "သင့်ရဲ့ အလုပ်စားပွဲ သို့မဟုတ် အခန်းဟာ -", options: [
                { text: "အမြဲတမ်း သပ်သပ်ရပ်ရပ်နဲ့ စနစ်တကျ ရှိနေတတ်တယ်", score: { J: 2, P: 0 } },
                { text: "ပစ္စည်းတွေ ပြန့်ကျဲနေတတ်ပေမယ့် ကိုယ်တိုင်တော့ ရှာတတ်တယ်", score: { J: 0, P: 2 } }
            ]},
            { text: "သင်ဟာ ဘယ်လိုလူမျိုးလို့ ထင်သလဲ -", options: [
                { text: "ဆုံးဖြတ်ချက်တစ်ခုကို မြန်မြန်ချပြီး အပြီးသတ်ရတာကို ကြိုက်သူ", score: { J: 2, P: 0 } },
                { text: "ရွေးချယ်စရာတွေကို ဖွင့်ထားပြီး နောက်ဆုံးမှ ဆုံးဖြတ်ချင်သူ", score: { J: 0, P: 2 } }
            ]},
            { text: "နေ့စဉ်ဘဝမှာ သင်ဟာ -", options: [
                { text: "To-do List တွေ သုံးပြီး စနစ်တကျ နေထိုင်တတ်တယ်", score: { J: 2, P: 0 } },
                { text: "စိတ်ကူးပေါက်ရာ လွတ်လွတ်လပ်လပ် နေထိုင်ရတာကို နှစ်သက်တယ်", score: { J: 0, P: 2 } }
            ]}
        ];

        const typeDescriptions = {
            "ISTJ": { name: "စစ်ဆေးသူ (The Inspector)", desc: "လက်တွေ့ကျ၊ တည်ငြိမ်ပြီး တာဝန်ယူမှု အပြည့်ရှိသူများဖြစ်သည်။ စနစ်တကျ လုပ်ဆောင်ရခြင်းကို နှစ်သက်ပြီး ယုံကြည်စိတ်ချရဆုံးသော သူများဖြစ်သည်။" },

            "ESTP": { name: "စွမ်းအင်ရှင် (The Entrepreneur)", desc: "တက်ကြွပြီး စွန့်စားရတာကို နှစ်သက်သူများဖြစ်သည်။ လက်တွေ့ကျကျ ချက်ချင်းလုပ်ဆောင်ရတာကို သဘောကျသူများဖြစ်သည်။" },
            "ESFP": { name: "ဖျော်ဖြေသူ (The Entertainer)", desc: "ပျော်ပျော်နေတတ်ပြီး လူမှုဆက်ဆံရေး ကောင်းမွန်သူများဖြစ်သည်။ ဘဝကို ပျော်ရွှင်စွာ ဖြတ်သန်းပြီး အခြားသူများကိုလည်း ပျော်ရွှင်စေသူများဖြစ်သည်။" },

            "ENTP": { name: "စိန်ခေါ်သူ (The Debater)", desc: "ဉာဏ်ထက်မြက်ပြီး စကားပြောကောင်းသူများဖြစ်သည်။ အယူအဆအသစ်တွေကို စိန်ခေါ်ရတာကို နှစ်သက်ပြီး တီထွင်ကြံဆတတ်ကြသည်။" },
            "ESTJ": { name: "ကြီးကြပ်သူ (The Executive)", desc: "လက်တွေ့ကျပြီး စီမံခန့်ခွဲမှု ကောင်းသူများဖြစ်သည်။ စနစ်တကျ ဦးဆောင်ရတာကို နှစ်သက်ပြီး ပြတ်သားသူများဖြစ်သည်။" },
            "ESFJ": { name: "ပံ့ပိုးသူ (The Consul)", desc: "ဖော်ရွေပြီး စိတ်ထားကောင်းသူများဖြစ်သည်။ လူမှုအသိုင်းအဝိုင်းတွင် အားလုံးနှင့် ပြေလည်အောင် ပေါင်းသင်းတတ်ကြသည်။" },
            "ENFJ": { name: "ခေါင်းဆောင် (The Protagonist)", desc: "ဩဇာရှိပြီး စိတ်ဓာတ်တက်ကြွစေသူများဖြစ်သည်။ အခြားသူများ၏ အလားအလာကို မြှင့်တင်ပေးနိုင်သော ခေါင်းဆောင်ကောင်းများဖြစ်သည်။" },
            "ENTJ": { name: "စစ်သူကြီး (The Commander)", desc: "ပြတ်သားပြီး ရည်မှန်းချက် ကြီးမားသူများဖြစ်သည်။ အခက်အခဲများကို ကျော်လွှားပြီး ပန်းတိုင်ရောက်အောင် ဦးဆောင်နိုင်သူများဖြစ်သည်။" }
        };

        let currentQ = 0;
        let scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

        function startTest() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('questionNumber').innerText = `မေးခွန်း ${currentQ + 1} / ${questions.length}`;
            document.getElementById('questionText').innerText = q.text;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    for(let k in opt.score) scores[k] += opt.score[k];
                    currentQ++;
                    if(currentQ < questions.length) {
                        showQuestion();
                        window.scrollTo(0,0);
                    } else showResult();
                };
                container.appendChild(btn);
            });
            document.getElementById('progressFill').style.width = `${((currentQ+1)/questions.length)*100}%`;
        }

        function showResult() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultsScreen').classList.remove('hidden');
            const type = (scores.E >= scores.I ? 'E':'I') + (scores.S >= scores.N ? 'S':'N') + (scores.T >= scores.F ? 'T':'F') + (scores.J >= scores.P ? 'J':'P');
            const data = typeDescriptions[type];
            document.getElementById('mbtiType').innerText = type;
            document.getElementById('typeName').innerText = data.name;
            document.getElementById('typeDescription').innerText = data.desc;
            window.scrollTo(0,0);
        }
    </script>
