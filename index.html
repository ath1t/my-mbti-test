<!DOCTYPE html>
<html lang="my" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Type Explorer | MBTI Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=Padauk:wght@400;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #0a0a14;
            --card-bg: rgba(20, 20, 35, 0.95);
            --surface: rgba(255,255,255,0.05);
            --surface-hover: rgba(255,255,255,0.09);
            --accent: #8b5cf6;
            --accent-2: #7c3aed;
            --accent-light: #a78bfa;
            --accent-dark: #6d28d9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-sub: #cbd5e1;
            --border: rgba(255,255,255,0.1);
            --border-accent: rgba(139, 92, 246, 0.4);
            --radius: 24px;
            --radius-sm: 16px;
            --radius-lg: 32px;
            --shadow: 0 20px 50px rgba(0,0,0,0.4);
            --glow: 0 0 50px rgba(139, 92, 246, 0.2);
            --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
            --gradient: linear-gradient(135deg, #8b5cf6, #7c3aed, #6d28d9);
        }
        [data-theme="light"] {
            --primary-bg: #f5f7ff;
            --card-bg: rgba(255,255,255,0.98);
            --surface: rgba(0,0,0,0.03);
            --surface-hover: rgba(0,0,0,0.07);
            --accent: #7c3aed;
            --accent-2: #6d28d9;
            --accent-light: #8b5cf6;
            --accent-dark: #5b21b6;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --text-sub: #475569;
            --border: rgba(0,0,0,0.08);
            --border-accent: rgba(124, 58, 237, 0.3);
            --shadow: 0 20px 50px rgba(0,0,0,0.08);
            --glow: 0 0 50px rgba(124, 58, 237, 0.1);
            --gradient: linear-gradient(135deg, #7c3aed, #6d28d9, #5b21b6);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            min-height: 100vh;
            background: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 24px 20px 60px;
            font-family: 'DM Sans', 'Padauk', 'Sarabun', sans-serif;
            transition: background var(--transition), color var(--transition);
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }

        body::before, body::after {
            content:'';
            position:fixed;
            pointer-events:none;
            z-index:0;
            filter: blur(80px);
            opacity: 0.5;
        }
        body::before {
            width:600px; height:600px;
            top:-200px; right:-200px;
            background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 70%);
        }
        body::after {
            width:500px; height:500px;
            bottom:-150px; left:-150px;
            background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 70%);
        }
        [data-theme="light"] body::before { background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%); }
        [data-theme="light"] body::after  { background: radial-gradient(circle, rgba(109,40,217,0.1) 0%, transparent 70%); }

        .container {
            width: 100%;
            max-width: 720px;
            position: relative;
            z-index: 1;
        }

        /* TOP BAR */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            gap: 16px;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-main);
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
        .lang-pills {
            display: flex;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px;
            backdrop-filter: blur(10px);
        }
        .lang-btn {
            padding: 8px 18px;
            border-radius: 50px;
            border: none;
            background: transparent;
            color: var(--text-sub);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            transition: all var(--transition);
            font-family: inherit;
        }
        .lang-btn.active {
            background: var(--gradient);
            color: #fff;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }
        .lang-btn:not(.active):hover { color: var(--text-main); background: var(--surface-hover); }

        .theme-toggle {
            width: 44px; height: 44px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }
        .theme-toggle:hover { border-color: var(--border-accent); box-shadow: var(--glow); transform: rotate(15deg); }

        /* CARDS */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 52px 48px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(20px);
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            transition: opacity 0.6s ease, transform 0.6s ease;
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient);
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .glass-card.visible { opacity: 1; transform: translateY(0) scale(1); }
        .hidden { display: none !important; }

        /* START SCREEN */
        .start-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border-accent);
            border-radius: 50px;
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-light);
            margin-bottom: 24px;
        }
        .start-badge .dot { 
            width:8px; height:8px; 
            border-radius:50%; 
            background:var(--accent-light); 
            animation: pulse-dot 2s infinite; 
        }
        @keyframes pulse-dot { 
            0%,100%{opacity:1;transform:scale(1)} 
            50%{opacity:0.7;transform:scale(0.8)} 
        }

        #titleText {
            font-family: 'Playfair Display', 'Padauk', serif;
            font-size: 3.2rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        #welcomeText {
            color: var(--text-sub);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-pill {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 20px 16px;
            text-align: center;
            transition: all var(--transition);
        }
        .stat-pill:hover {
            transform: translateY(-4px);
            border-color: var(--border-accent);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .stat-pill .stat-num {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .stat-pill .stat-label { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        /* PROGRESS */
        .progress-wrap { margin-bottom: 32px; }
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .progress-label { 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            font-weight: 600; 
            letter-spacing: 0.05em; 
            text-transform: uppercase; 
        }
        .progress-perc-text { 
            font-size: 0.9rem; 
            font-weight: 800; 
            color: var(--accent); 
        }
        .progress-track {
            width: 100%;
            height: 8px;
            background: var(--surface);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: var(--gradient);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 99px;
            position: relative;
            overflow: hidden;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* QUESTION */
        .q-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .q-badge {
            background: var(--gradient);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding: 6px 16px;
            border-radius: 99px;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        .q-category-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            background: var(--surface);
            padding: 4px 12px;
            border-radius: 50px;
        }

        #questionText {
            font-family: 'Playfair Display', 'Padauk', serif;
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 36px;
            color: var(--text-main);
        }

        .options { display: flex; flex-direction: column; gap: 16px; }
        .option-btn {
            padding: 22px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            font-size: 1.05rem;
            font-family: inherit;
            font-weight: 400;
            line-height: 1.6;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .option-btn::before {
            content:'';
            position:absolute;
            left:0; top:0;
            width:4px; height:100%;
            background: var(--gradient);
            transform: scaleY(0);
            transition: transform 0.25s ease;
            border-radius: 4px 0 0 4px;
        }
        .option-btn:hover {
            border-color: var(--border-accent);
            background: var(--surface-hover);
            transform: translateX(6px);
            box-shadow: 0 6px 25px rgba(139, 92, 246, 0.15);
        }
        .option-btn:hover::before { transform: scaleY(1); }
        .option-btn:active { transform: translateX(3px) scale(0.99); }

        /* RESULT SCREEN */
        .result-header { 
            text-align: center; 
            margin-bottom: 40px; 
            position: relative;
        }
        #resultIntro { 
            font-size: 0.95rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            font-weight: 700; 
            margin-bottom: 16px; 
        }

        #mbtiType {
            font-family: 'Playfair Display', serif;
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: 10px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: popIn 0.8s cubic-bezier(0.34,1.56,0.64,1);
            line-height: 1;
            margin: 10px 0;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }
        @keyframes popIn { 
            0%{opacity:0;transform:scale(0.5) rotate(-5deg)} 
            80%{transform:scale(1.08) rotate(2deg)} 
            100%{opacity:1;transform:scale(1) rotate(0)} 
        }

        #typeName {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 12px;
        }

        .result-divider {
            width: 80px; height: 4px;
            background: var(--gradient);
            border-radius: 99px;
            margin: 24px auto 32px;
        }

        #typeDesc {
            font-size: 1.1rem;
            line-height: 1.9;
            color: var(--text-sub);
            margin-bottom: 40px;
            text-align: center;
        }

        .traits-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 40px;
        }
        .trait-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 20px 18px;
            transition: all var(--transition);
        }
        .trait-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-accent);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .trait-card .trait-icon { 
            font-size: 1.5rem; 
            margin-bottom: 10px; 
            color: var(--accent);
        }
        .trait-card .trait-label { 
            font-weight: 700; 
            color: var(--text-main); 
            font-size: 0.9rem; 
            line-height: 1.4;
        }

        /* BUTTONS */
        .btn-action {
            width: 100%;
            padding: 20px;
            background: var(--gradient);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: inherit;
            letter-spacing: 0.02em;
            transition: all var(--transition);
            box-shadow: 0 6px 25px rgba(139, 92, 246, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn-action::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
        }
        .btn-action:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(139, 92, 246, 0.5);
            filter: brightness(1.1);
        }
        .btn-action:hover::after {
            animation: shimmer-btn 1.5s infinite;
        }
        .btn-action:active { transform: translateY(0); }

        @keyframes shimmer-btn {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .btn-secondary {
            width: 100%;
            padding: 18px;
            background: transparent;
            color: var(--text-sub);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            font-family: inherit;
            margin-top: 14px;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary:hover { 
            border-color: var(--border-accent); 
            color: var(--accent); 
            background: var(--surface); 
            transform: translateY(-2px);
        }

        /* FOOTER */
        .footer-note {
            text-align: center;
            margin-top: 32px;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .glass-card { padding: 36px 28px; }
            #titleText { font-size: 2.5rem; }
            #mbtiType { font-size: 4.5rem; letter-spacing: 6px; }
            .stats-row { gap: 12px; }
            .traits-grid { grid-template-columns: 1fr; }
            .top-bar { flex-direction: column; align-items: stretch; }
            .lang-pills { justify-content: center; }
            .logo { justify-content: center; margin-bottom: 10px; }
            .theme-toggle { align-self: flex-end; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="top-bar">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-brain"></i>
            </div>
            <span>Personality Type Explorer</span>
        </div>
        <div class="lang-pills">
            <button class="lang-btn active" data-lang="my">မြန်မာ</button>
            <button class="lang-btn" data-lang="en">English</button>
            <button class="lang-btn" data-lang="th">ไทย</button>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <!-- START SCREEN -->
    <div class="glass-card visible" id="startScreen">
        <div class="start-badge">
            <span class="dot"></span>
            <span id="badgeText">MBTI Assessment</span>
        </div>
        <h1 id="titleText">Discover Your Personality</h1>
        <p id="welcomeText"></p>
        <div class="stats-row">
            <div class="stat-pill">
                <div class="stat-num">30</div>
                <div class="stat-label" id="statQ">Questions</div>
            </div>
            <div class="stat-pill">
                <div class="stat-num">5</div>
                <div class="stat-label" id="statMin">Minutes</div>
            </div>
            <div class="stat-pill">
                <div class="stat-num">16</div>
                <div class="stat-label" id="statTypes">Personality Types</div>
            </div>
        </div>
        <button class="btn-action" id="startBtn">
            <i class="fas fa-play-circle" style="margin-right: 10px;"></i>
            Begin Assessment
        </button>
        <div class="footer-note">
            Based on Myers-Briggs Type Indicator® theory
        </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div class="glass-card hidden" id="quizScreen">
        <div class="progress-wrap">
            <div class="progress-header">
                <span class="progress-label" id="progressLabel">Progress</span>
                <span class="progress-perc-text" id="progressPerc">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div class="q-meta">
            <span class="q-badge" id="qCount">Q 1 / 30</span>
            <span class="q-category-tag" id="qCatTag"></span>
        </div>
        <div id="questionText"></div>
        <div class="options" id="optionsContainer"></div>
    </div>

    <!-- RESULT SCREEN -->
    <div class="glass-card hidden" id="resultScreen">
        <div class="result-header">
            <p id="resultIntro"></p>
            <div id="mbtiType"></div>
            <div id="typeName"></div>
        </div>
        <div class="result-divider"></div>
        <p id="typeDesc"></p>
        <div class="traits-grid" id="traitsGrid"></div>
        <button class="btn-action" id="restartBtn">
            <i class="fas fa-redo" style="margin-right: 10px;"></i>
            Retake Assessment
        </button>
        <button class="btn-secondary" id="shareBtn">
            <i class="fas fa-share-alt"></i>
            Share Result
        </button>
    </div>

</div>
<script>
// Keep the same JavaScript as before, but with updated text
let currentLang = 'my';
let currentQ = 0;
const TOTAL_Q = 30;
const scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

const uiText = {
    my:{
        badge:'MBTI စစ်ဆေးမှု',
        title:'ကိုယ်ရည်ကိုယ်သွေး စစ်ဆေးခြင်း',
        welcome:'မေးခွန်း ၃၀ ပါဝင်ပြီး ၅ မိနစ်ခန့် ကြာမြင့်ပါမည်။ သင့်ကိုယ်ရည်ကိုယ်သွေးကို အမှန်ကန်ဆုံး သိရှိနိုင်ရန် စိတ်ထဲရှိသည့်အတိုင်း ဖြေဆိုပေးပါ။',
        start:'စစ်ဆေးမှု စတင်ရန်',
        intro:'သင့်ကိုယ်ရည်ကိုယ်သွေး အမျိုးအစားမှာ',
        restart:'ပြန်လည်စစ်ဆေးရန်',
        share:'ရလဒ်မျှဝေရန်',
        progress:'တိုးတက်မှု',
        statQ:'မေးခွန်းများ',
        statMin:'မိနစ်',
        statTypes:'အမျိုးအစားများ',
        qPrefix:'မေးခွန်း',
        catLabels:{EI:'ဆက်ဆံရေး',SN:'သတင်းအချက်',TF:'ဆုံးဖြတ်ချက်',JP:'ဘဝပုံစံ'}
    },
    en:{
        badge:'MBTI Assessment',
        title:'Personality Type Explorer',
        welcome:'Discover your true personality type with 30 carefully crafted questions. Answer honestly — choose what feels most natural to you, not what you think is ideal.',
        start:'Begin Assessment',
        intro:'Your Personality Type is',
        restart:'Retake Assessment',
        share:'Share Result',
        progress:'Progress',
        statQ:'Questions',
        statMin:'Minutes',
        statTypes:'Personality Types',
        qPrefix:'Question',
        catLabels:{EI:'Energy',SN:'Information',TF:'Decision',JP:'Lifestyle'}

/* ===================== HELPERS ===================== */
function setLanguage(lang) {
    currentLang = lang;
    const t = uiText[lang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    document.documentElement.lang = lang;
    document.getElementById('badgeText').textContent    = t.badge;
    document.getElementById('titleText').textContent    = t.title;
    document.getElementById('welcomeText').textContent  = t.welcome;
    document.getElementById('startBtn').textContent     = t.start;
    document.getElementById('restartBtn').textContent   = t.restart;
    document.getElementById('shareBtn').innerHTML       = '<i class="fas fa-share-alt"></i> ' + t.share;
    document.getElementById('statQ').textContent        = t.statQ;
    document.getElementById('statMin').textContent      = t.statMin;
    document.getElementById('statTypes').textContent    = t.statTypes;
    document.getElementById('progressLabel').textContent = t.progress;
    if (!document.getElementById('quizScreen').classList.contains('hidden')) showQuestion();
}

function transition(hideEl, showEl, cb) {
    hideEl.classList.remove('visible');
    setTimeout(() => {
        hideEl.classList.add('hidden');
        showEl.classList.remove('hidden');
        setTimeout(() => { showEl.classList.add('visible'); if(cb) cb(); }, 30);
    }, 300);
}

function startTest() {
    transition(document.getElementById('startScreen'), document.getElementById('quizScreen'));
    showQuestion();
}

function showQuestion() {
    const q = questions[currentQ];
    const loc = q[currentLang];
    const t = uiText[currentLang];
    const pct = Math.round((currentQ / TOTAL_Q) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPerc').textContent = pct + '%';
    document.getElementById('qCount').textContent = `${t.qPrefix} ${currentQ + 1} / ${TOTAL_Q}`;
    document.getElementById('qCatTag').textContent = t.catLabels[q.cat] || q.cat;
    document.getElementById('questionText').textContent = loc.q;
    const opts = document.getElementById('optionsContainer');
    opts.innerHTML = '';
    [loc.a, loc.b].forEach((label, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = label;
        btn.addEventListener('click', () => handleAnswer(i === 0 ? q.cat[0] : q.cat[1]));
        opts.appendChild(btn);
    });
}

function handleAnswer(key) {
    scores[key]++;
    currentQ++;
    const pct = Math.round((currentQ / TOTAL_Q) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPerc').textContent = pct + '%';
    if (currentQ < TOTAL_Q) { showQuestion(); } else { showResult(); }
}

function showResult() {
    const type = (scores.E>=scores.I?'E':'I')+(scores.S>=scores.N?'S':'N')+(scores.T>=scores.F?'T':'F')+(scores.J>=scores.P?'J':'P');
    const data = typeDescriptions[type]?.[currentLang] ?? {name:'—',desc:'No description available.',traits:[]};
    transition(document.getElementById('quizScreen'), document.getElementById('resultScreen'), () => {
        document.getElementById('resultIntro').textContent = uiText[currentLang].intro;
        document.getElementById('mbtiType').textContent   = type;
        document.getElementById('typeName').textContent   = data.name;
        document.getElementById('typeDesc').textContent   = data.desc;
        const grid = document.getElementById('traitsGrid');
        grid.innerHTML = '';
        (data.traits || []).forEach(trait => {
            const parts = trait.split(' ');
            const icon = parts[0];
            const label = parts.slice(1).join(' ');
            const card = document.createElement('div');
            card.className = 'trait-card';
            card.innerHTML = `<div class="trait-icon">${icon}</div><div class="trait-label">${label}</div>`;
            grid.appendChild(card);
        });
    });
}

function resetTest() {
    currentQ = 0;
    Object.keys(scores).forEach(k => scores[k] = 0);
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('progressPerc').textContent = '0%';
    transition(document.getElementById('resultScreen'), document.getElementById('startScreen'));
    setLanguage(currentLang);
}

function shareResult() {
    const type = document.getElementById('mbtiType').textContent;
    const name = document.getElementById('typeName').textContent;
    const text = `My MBTI type is ${type} – ${name}! 🎉 Discover yours at this personality test.`;
    const btn = document.getElementById('shareBtn');
    if (navigator.share) {
        navigator.share({ title: 'My MBTI Result', text }).catch(() => {});
    } else {
        navigator.clipboard?.writeText(text).then(() => {
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => btn.innerHTML = orig, 2000);
        });
    }
}

function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.dataset.theme === 'dark';
    html.dataset.theme = isDark ? 'light' : 'dark';
    document.getElementById('themeToggle').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
}

document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLanguage(btn.dataset.lang)));
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    document.getElementById('startBtn').addEventListener('click', startTest);
    document.getElementById('restartBtn').addEventListener('click', resetTest);
    document.getElementById('shareBtn').addEventListener('click', shareResult);
    setLanguage(currentLang);
});
</script>
