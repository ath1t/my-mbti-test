<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI Personal Analysis - Strategy Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #121212;
            --card-bg: rgba(30, 30, 30, 0.98);
            --accent-color: #ffd700;
            --text-main: #ffffff;
            --text-muted: #cccccc;
            --success: #4ee44e;
            --danger: #ff6b6b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Padauk', sans-serif; }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            background-attachment: fixed;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 700px; }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .header h1 { font-size: 1.8rem; text-align: center; margin-bottom: 20px; color: var(--accent-color); }

        .progress-bar { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; margin-bottom: 25px; }
        .progress-fill { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.3s; }

        .question-text { font-size: 1.4rem; font-weight: 700; margin-bottom: 25px; line-height: 1.4; }

        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            text-align: left;
            transition: 0.2s;
        }
        .option-btn:hover { background: var(--accent-color); color: #000; border-color: var(--accent-color); }

        .btn-action {
            width: 100%; padding: 16px; background: var(--accent-color); color: #000;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1.1rem;
        }

        .hidden { display: none; }

        .result-type { font-size: 4.5rem; font-weight: 800; color: var(--accent-color); margin: 5px 0; }
        .detail-section { text-align: left; margin-top: 25px; border-top: 1px solid #444; padding-top: 20px; }
        .detail-title { color: var(--accent-color); font-size: 1.2rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        ul { margin-left: 20px; margin-bottom: 15px; color: var(--text-muted); }
        li { margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="startScreen" class="glass-card">
            <h1>MBTI Strategy Test</h1>
            <p style="margin-bottom: 20px; color: var(--text-muted);">သင်၏ ကိုယ်ရည်ကိုယ်သွေးကို အသေးစိတ် ခွဲခြမ်းစိတ်ဖြာပြီး ဗျူဟာမြောက် အကြံပြုချက်များကို ရယူပါ။</p>
            <button class="btn-action" onclick="startTest()">စတင်စစ်ဆေးမည်</button>
        </div>

        <div id="quizScreen" class="glass-card hidden">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
        </div>

        <div id="resultsScreen" class="glass-card hidden" style="text-align: center;">
            <p>သင့်ကိုယ်ရည်ကိုယ်သွေး အမျိုးအစားမှာ</p>
            <div class="result-type" id="mbtiType"></div>
            <h2 id="typeName" style="color: var(--success); margin-bottom: 15px;"></h2>
            <p id="typeDescription" style="color: var(--text-muted); text-align: justify;"></p>
            
            <div id="detailContent" class="detail-section">
                </div>

            <button class="btn-action" onclick="location.reload()" style="margin-top: 30px; background: #444; color: #fff;">အစမှ ပြန်လည်ဖြေဆိုရန်</button>
        </div>
    </div>

    <script>
        const questions = [
            /* E vs I */
            { text: "လူမှုရေးပွဲတစ်ခုမှာ သင်ဟာ -", options: [
                { text: "လူအများနဲ့ စကားပြောရတာကို စွမ်းအင်တက်ကြွစေတယ်", score: { E: 2, I: 0 } },
                { text: "ရင်းနှီးသူအနည်းငယ်နဲ့ပဲ အချိန်ဖြုန်းရတာကို ပိုနှစ်သက်တယ်", score: { E: 0, I: 2 } }
            ]},
            /* S vs N */
            { text: "သင်ဟာ အရာရာကို ကြည့်တဲ့အခါ -", options: [
                { text: "လက်တွေ့ကျကျ အချက်အလက်နဲ့ လက်ရှိအခြေအနေကိုပဲ ကြည့်တယ်", score: { S: 2, N: 0 } },
                { text: "အနာဂတ်ဖြစ်နိုင်ချေတွေနဲ့ စိတ်ကူးသစ်တွေကို ပိုကြည့်တယ်", score: { S: 0, N: 2 } }
            ]},
            /* T vs F */
            { text: "ဆုံးဖြတ်ချက်ချတဲ့အခါ -", options: [
                { text: "ယုတ္တိဗေဒ (Logic) နဲ့ အမှန်တရားကိုပဲ အခြေခံတယ်", score: { T: 2, F: 0 } },
                { text: "လူမှုရေးနဲ့ တစ်ဖက်လူရဲ့ ခံစားချက်ကိုပါ ထည့်သွင်းစဉ်းစားတယ်", score: { T: 0, F: 2 } }
            ]},
            /* J vs P */
            { text: "ခရီးသွားဖို့ ပြင်ဆင်တဲ့အခါ -", options: [
                { text: "သွားမယ့်နေရာနဲ့ အချိန်ဇယားကို ကြိုတင်စနစ်တကျ စီစဉ်တယ်", score: { J: 2, P: 0 } },
                { text: "ကြိုမစီစဉ်ဘဲ ရောက်တဲ့အခါကျမှ အဆင်ပြေသလို သွားလာတယ်", score: { J: 0, P: 2 } }
            ]}
            // ဆရာကြီး အနေဖြင့် မူလ Code ထဲမှ မေးခွန်း ၂၀ လုံးကို ဤနေရာတွင် ပြန်လည်ထည့်သွင်းနိုင်ပါသည်
        ];

        const typeDetails = {
            "INTJ": {
                name: "ဗိသုကာ (The Architect)",
                desc: "မဟာဗျူဟာမြောက် စဉ်းစားတွေးခေါ်နိုင်ပြီး ကိုယ့်ကိုယ်ကိုယ် ယုံကြည်မှုရှိသူများဖြစ်သည်။",
                strengths: ["အမြော်အမြင်ရှိခြင်း", "ယုတ္တိကျကျ ဆုံးဖြတ်ခြင်း", "လွတ်လပ်စွာ တွေးခေါ်ခြင်း"],
                weaknesses: ["တစ်ဖက်လူ၏ ခံစားချက်ကို လျစ်လျူရှုတတ်ခြင်း", "ဝေဖန်မှု ပြင်းထန်ခြင်း"],
                career: "Strategic Planner, Engineer, Scientist"
            },
            "ENFJ": {
                name: "ခေါင်းဆောင် (The Protagonist)",
                desc: "ဩဇာရှိပြီး စိတ်ဓာတ်တက်ကြွစေသူများဖြစ်သည်။ အခြားသူများကို ဦးဆောင်ရန် မွေးဖွားလာသူများဖြစ်သည်။",
                strengths: ["ကိုယ်ချင်းစာတရားရှိခြင်း", "စကားပြော ကောင်းမွန်ခြင်း", "ယုံကြည်မှု တည်ဆောက်နိုင်ခြင်း"],
                weaknesses: ["လူတိုင်းကို စိတ်ကျေနပ်အောင် လုပ်ဆောင်လိုခြင်း", "ဝေဖန်မှုကို ခံစားလွယ်ခြင်း"],
                career: "Teacher, HR Manager, Politician"
            }
            // အခြား ၁၄ မျိုးကိုလည်း ဤ format အတိုင်း ဆက်လက်ဖြည့်စွက်နိုင်ပါသည်
        };

        let currentQ = 0;
        let scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

        function startTest() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('questionText').innerText = q.text;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    for(let k in opt.score) scores[k] += opt.score[k];
                    currentQ++;
                    if(currentQ < questions.length) showQuestion();
                    else showResult();
                };
                container.appendChild(btn);
            });
            document.getElementById('progressFill').style.width = `${((currentQ+1)/questions.length)*100}%`;
        }

        function showResult() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultsScreen').classList.remove('hidden');
            
            const type = (scores.E >= scores.I ? 'E':'I') + (scores.S >= scores.N ? 'S':'N') + (scores.T >= scores.F ? 'T':'F') + (scores.J >= scores.P ? 'J':'P');
            const data = typeDetails[type] || { name: "အမျိုးအစား သတ်မှတ်ရန် ခက်ခဲနေသည်", desc: "မေးခွန်းများကို ပြန်လည်ဖြေဆိုကြည့်ပါ။", strengths: [], weaknesses: [], career: "N/A" };

            document.getElementById('mbtiType').innerText = type;
            document.getElementById('typeName').innerText = data.name;
            document.getElementById('typeDescription').innerText = data.desc;

            const detailHTML = `
                <div class="detail-title">⭐ အားသာချက်များ</div>
                <ul>${data.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
                <div class="detail-title" style="color:var(--danger)">⚠️ အားနည်းချက်များ</div>
                <ul>${data.weaknesses.map(w => `<li>${w}</li>`).join('')}</ul>
                <div class="detail-title" style="color:var(--success)">💼 အကြံပြုအလုပ်အကိုင်</div>
                <p style="margin-left:20px; color:var(--text-muted)">${data.career}</p>
            `;
            document.getElementById('detailContent').innerHTML = detailHTML;
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
