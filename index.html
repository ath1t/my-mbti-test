<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI Strategic Analysis Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #00d2ff;
            --accent-gold: #ffd700;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Padauk', sans-serif; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 750px; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .progress-container { margin-bottom: 30px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d2ff, #3a7bd5); width: 0%; transition: 0.4s ease; }

        h1 { font-size: 1.8rem; text-align: center; margin-bottom: 20px; color: var(--accent); letter-spacing: 1px; }

        .question-box { min-height: 100px; font-size: 1.4rem; font-weight: 700; margin-bottom: 30px; line-height: 1.5; }

        .options-grid { display: flex; flex-direction: column; gap: 15px; }

        .opt-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 18px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
        }

        .opt-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .result-header { font-size: 4rem; font-weight: 800; background: linear-gradient(to right, #fff, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }
        
        .analysis-section { text-align: left; margin-top: 30px; }
        .analysis-card { background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .analysis-card h3 { font-size: 1.1rem; color: var(--accent-gold); margin-bottom: 8px; }

        .hidden { display: none; }
        .btn-action { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--accent); color: #000; font-weight: 800; font-size: 1.1rem; cursor: pointer; }

        @media (max-width: 500px) {
            .glass-card { padding: 25px; }
            h1 { font-size: 1.4rem; }
            .question-box { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start" class="glass-card">
        <h1>MBTI Strategy Profiling</h1>
        <p style="text-align:center; color: #ccc; margin-bottom: 30px;">
            မေးခွန်း ၃၀ အသုံးပြု၍ သင်၏ အတွင်းစိတ်နှင့် အလားအလာများကို <br><b>ဗျူဟာမြောက်</b> ခွဲခြမ်းစိတ်ဖြာပေးပါမည်။
        </p>
        <button class="btn-action" onclick="initTest()">စစ်ဆေးမှု စတင်မည်</button>
    </div>

    <div id="quiz" class="glass-card hidden">
        <div class="progress-container">
            <div id="qCount" style="font-size: 0.9rem; margin-bottom: 8px; color: var(--accent);">Question 1 of 30</div>
            <div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
        </div>
        <div id="qText" class="question-box"></div>
        <div id="opts" class="options-grid"></div>
    </div>

    <div id="result" class="glass-card hidden" style="text-align: center;">
        <p style="text-transform: uppercase; font-size: 0.9rem; color: var(--accent);">Your Strategic Type is</p>
        <div id="mbtiType" class="result-header"></div>
        <h2 id="typeName" style="color: var(--accent-gold); margin-bottom: 15px;"></h2>
        <p id="typeDesc" style="color: #ddd; font-size: 1.05rem; line-height: 1.6;"></p>
        
        <div class="analysis-section" id="analysisArea"></div>
        
        <button class="btn-action" onclick="location.reload()" style="margin-top: 20px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--glass-border);">ပြန်လည်စစ်ဆေးမည်</button>
    </div>
</div>

<script>
    const questions = [
        { q: "လူမှုပတ်ဝန်းကျင်သစ်မှာ သင်ဟာ -", a: [{t:"စကားစပြောရတာကို အားရကျေနပ်တယ်", s:{E:2}}, {t:"သူတစ်ပါး လာပြောမှ ပြန်ပြောလေ့ရှိတယ်", s:{I:2}}] },
        { q: "ဆုံးဖြတ်ချက်ချတဲ့အခါ သင်ဟာ -", a: [{t:"လက်တွေ့ကျတဲ့ အချက်အလက်ကို ကြည့်တယ်", s:{S:2}}, {t:"ဖြစ်နိုင်ခြေနဲ့ အနာဂတ်ကို ကြည့်တယ်", s:{N:2}}] },
        { q: "အလုပ်တစ်ခုမှာ သင်ဟာ -", a: [{t:"တိကျတဲ့ Logic နဲ့ စံနှုန်းကို ကြည့်တယ်", s:{T:2}}, {t:"လူမှုရေးနဲ့ သဟဇာတဖြစ်မှုကို ကြည့်တယ်", s:{F:2}}] },
        { q: "သင့်ရဲ့ အစီအစဉ်တွေဟာ -", a: [{t:"ကြိုတင်ပြင်ဆင်ထားတဲ့အတိုင်း သွားတယ်", s:{J:2}}, {t:"အခြေအနေအရ လိုက်လျောညီထွေ ပြောင်းလဲတယ်", s:{P:2}}] },
        { q: "စိတ်ပင်ပန်းတဲ့အခါ စွမ်းအင်ပြန်ဖြည့်ဖို့ -", a: [{t:"သူငယ်ချင်းတွေနဲ့ ဆုံတွေ့တယ်", s:{E:2}}, {t:"တစ်ယောက်တည်း တိတ်ဆိတ်စွာ နေတယ်", s:{I:2}}] },
        { q: "သင်ယူတဲ့အခါ ဘယ်အရာကို ပိုကြိုက်သလဲ -", a: [{t:"လက်တွေ့ အသုံးချလို့ရတဲ့ အရာ", s:{S:2}}, {t:"စိတ်ဝင်စားစရာ သဘောတရား (Theory)", s:{N:2}}] },
        { q: "ဝေဖန်မှုတစ်ခုကို ဘယ်လိုမြင်သလဲ -", a: [{t:"တိုးတက်ဖို့ လိုအပ်တဲ့ အချက်အလက်", s:{T:2}}, {t:"စိတ်ထိခိုက်စရာ ကိစ္စတစ်ခု", s:{F:2}}] },
        { q: "အလုပ်စားပွဲကို ကြည့်ရင် -", a: [{t:"အမြဲ သပ်သပ်ရပ်ရပ် ရှိနေတတ်တယ်", s:{J:2}}, {t:"အနည်းငယ် ရှုပ်ပွနေတတ်တယ်", s:{P:2}}] },
        { q: "လူအများရှေ့ စကားပြောရရင် -", a: [{t:"စွမ်းအင်တက်ကြွလာသလို ခံစားရတယ်", s:{E:2}}, {t:"မြန်မြန်ပြီးသွားရင် ကောင်းမယ်လို့ ထင်တယ်", s:{I:2}}] },
        { q: "အချက်အလက်တွေကို မှတ်သားတဲ့အခါ -", a: [{t:"အသေးစိတ် အချက်အလက်တွေကို သေချာမှတ်တယ်", s:{S:2}}, {t:"ခြုံငုံမိတဲ့ ပုံရိပ်ကို ပိုမှတ်မိတယ်", s:{N:2}}] },
        { q: "တစ်စုံတစ်ယောက်နဲ့ ငြင်းခုံရတဲ့အခါ -", a: [{t:"ဘယ်သူမှန်လဲဆိုတာကိုပဲ အဓိကထားတယ်", s:{T:2}}, {t:"တစ်ဖက်လူရဲ့ ခံစားချက်ကိုပါ ထည့်တွက်တယ်", s:{F:2}}] },
        { q: "အချိန်ဇယားတွေနဲ့ ပတ်သက်ပြီး -", a: [{t:"အတိအကျ လိုက်နာရတာကို နှစ်သက်တယ်", s:{J:2}}, {t:"အချိန်ဇယားမရှိဘဲ လွတ်လပ်တာကို ပိုကြိုက်တယ်", s:{P:2}}] },
        { q: "အားလပ်ရက်မှာ သင်ဟာ -", a: [{t:"လူအများရှိတဲ့နေရာကို သွားချင်တယ်", s:{E:2}}, {t:"အိမ်မှာပဲ အေးအေးဆေးဆေး နေချင်တယ်", s:{I:2}}] },
        { q: "အလုပ်တစ်ခု စတင်တဲ့အခါ -", a: [{t:"အရင်လုပ်နေကျ နည်းလမ်းအတိုင်း လုပ်တယ်", s:{S:2}}, {t:"နည်းလမ်းသစ်တွေကို စမ်းသပ်ကြည့်တယ်", s:{N:2}}] },
        { q: "သူငယ်ချင်းတစ်ယောက် ဝမ်းနည်းနေရင် -", a: [{t:"အဖြေရှာဖို့ အကြံပေးတယ်", s:{T:2}}, {t:"နွေးနွေးထွေးထွေး နှစ်သိမ့်ပေးတယ်", s:{F:2}}] },
        { q: "အလုပ်တွေကို ဘယ်လိုအပြီးသတ်သလဲ -", a: [{t:"သတ်မှတ်ရက်ထက် စောပြီး အပြီးသတ်တယ်", s:{J:2}}, {t:"သတ်မှတ်ရက် နားနီးမှ အပြင်းအထန်လုပ်တယ်", s:{P:2}}] },
        { q: "လူအုပ်ကြီးကြားမှာ -", a: [{t:"အလွယ်တကူ စကားပြောနိုင်တယ်", s:{E:2}}, {t:"ဘေးနားမှာပဲ ကပ်နေတတ်တယ်", s:{I:2}}] },
        { q: "သင်ဟာ -", a: [{t:"လက်တွေ့သမား (Practical)", s:{S:2}}, {t:"စိတ်ကူးယဉ်သမား (Imaginative)", s:{N:2}}] },
        { q: "အမှန်တရားကို ဖော်ပြတဲ့အခါ -", a: [{t:"တစ်ခါတလေ စိတ်နာစရာဖြစ်ပေမယ့် တည့်ပြောတယ်", s:{T:2}}, {t:"မပြောခင် တစ်ဖက်လူ ဘယ်လိုခံစားရမလဲ စဉ်းစားတယ်", s:{F:2}}] },
        { q: "စီမံကိန်းတစ်ခုကို -", a: [{t:"အဆင့်လိုက် စနစ်တကျ လုပ်ရတာ ကြိုက်တယ်", s:{J:2}}, {t:"စိတ်ကူးပေါက်သလို လုပ်ရတာ ကြိုက်တယ်", s:{P:2}}] },
        { q: "ပါတီပွဲတစ်ခုပြီးတဲ့အခါ -", a: [{t:"စွမ်းအင်တွေ ပြည့်ဝလာတယ်", s:{E:2}}, {t:"ပင်ပန်းသွားပြီး အနားယူဖို့ လိုတယ်", s:{I:2}}] },
        { q: "စာဖတ်တဲ့အခါ -", a: [{t:"စာရေးသူပြောတဲ့အတိုင်း တိုက်ရိုက်ယူတယ်", s:{S:2}}, {t:"စာသားတွေရဲ့ နောက်ကွယ်က အဓိပ္ပာယ်ကို ရှာတယ်", s:{N:2}}] },
        { q: "ခေါင်းဆောင်တစ်ယောက်ရဲ့ အရည်အချင်းဟာ -", a: [{t:"မျှတပြီး ပြတ်သားမှုရှိခြင်း", s:{T:2}}, {t:"နားလည်ပေးနိုင်ပြီး ကြင်နာမှုရှိခြင်း", s:{F:2}}] },
        { q: "သင့်ရဲ့ နေထိုင်မှုပုံစံဟာ -", a: [{t:"ဖွဲ့စည်းပုံရှိပြီး တည်ငြိမ်တယ်", s:{J:2}}, {t:"လိုက်လျောညီထွေရှိပြီး ပေါ့ပေါ့ပါးပါးရှိတယ်", s:{P:2}}] },
        { q: "အလုပ်ခွင်မှာ သင်ဟာ -", a: [{t:"အဖွဲ့လိုက် လုပ်ရတာ ပိုကြိုက်တယ်", s:{E:2}}, {t:"တစ်ယောက်တည်း လုပ်ရတာ ပိုအာရုံစိုက်နိုင်တယ်", s:{I:2}}] },
        { q: "သင်ဟာ -", a: [{t:"အချက်အလက်ကို ဦးစားပေးသူ", s:{S:2}}, {t:"သီအိုရီနဲ့ အယူအဆကို ဦးစားပေးသူ", s:{N:2}}] },
        { q: "သူတစ်ပါးနဲ့ ပတ်သက်ရင် -", a: [{t:"အမှားကို တည့်မတ်ပေးဖို့ ဦးစားပေးတယ်", s:{T:2}}, {t:"စိတ်ကျေနပ်မှု ရှိစေဖို့ ဦးစားပေးတယ်", s:{F:2}}] },
        { q: "အစီအစဉ်တစ်ခု ပြောင်းလဲသွားရင် -", a: [{t:"စိတ်တိုပြီး အနှောင့်အယှက်ဖြစ်တယ်", s:{J:2}}, {t:"အဆင်ပြေပါတယ်၊ ပြောင်းလို့ရတယ်လို့ ထင်တယ်", s:{P:2}}] },
        { q: "လူမှုဆက်ဆံရေးမှာ သင်ဟာ -", a: [{t:"ပွင့်လင်းပြီး ဖော်ရွေတယ်", s:{E:2}}, {t:"သိုသိုသိပ်သိပ် နေတတ်တယ်", s:{I:2}}] },
        { q: "သင်ဟာ အလုပ်တစ်ခုကို -", a: [{t:"အဆုံးထိပြီးအောင် အရင်လုပ်တယ်", s:{J:2}}, {t:"အသစ်တွေ ထပ်ရှာရင်း အချိန်ဆွဲတတ်တယ်", s:{P:2}}] }
    ];

    const dataMap = {
        "INTJ": { name: "The Architect (ဗိသုကာ)", desc: "မဟာဗျူဟာမြောက် စဉ်းစားတွေးခေါ်နိုင်ပြီး အရာရာကို ခွဲခြမ်းစိတ်ဖြာတတ်သူ။", s: ["အမြော်အမြင်ရှိခြင်း", "လွတ်လပ်စွာ တွေးခေါ်ခြင်း", "ပြတ်သားခြင်း"], w: ["ဝေဖန်မှု ပြင်းထန်ခြင်း", "လူမှုဆက်ဆံရေး ခက်ခဲခြင်း"], c: "CEO, Strategic Planner, Software Architect" },

        "ESTJ": { name: "The Executive (စီမံခန့်ခွဲသူ)", desc: "လက်တွေ့ကျပြီး စနစ်တကျ စီမံခန့်ခွဲတတ်သော ခေါင်းဆောင်။", s: ["စည်းကမ်းရှိခြင်း", "ထိရောက်ခြင်း"], w: ["ဝေဖန်မှုလက်ခံရန် ခက်ခဲခြင်း", "တင်းကျပ်လွန်းခြင်း"], c: "Manager, Financial Controller, Project Lead" },
        "ESFJ": { name: "The Consul (အကြံပေး)", desc: "လူမှုဆက်ဆံရေး ကောင်းမွန်ပြီး အခြားသူများကို ကူညီပေးရသည်ကို ပျော်ရွှင်သူ။", s: ["နွေးထွေးခြင်း", "တာဝန်သိခြင်း"], w: ["သူတစ်ပါးအမြင်ကို အလွန်ဂရုစိုက်ခြင်း"], c: "Event Planner, Receptionist, Sales" },

        "ESFP": { name: "The Entertainer (ဖျော်ဖြေသူ)", desc: "လက်ရှိအချိန်ကို ပျော်ရွှင်စွာ ဖြတ်သန်းပြီး အခြားသူများကို ပျော်ရွှင်စေသူ။", s: ["ပျော်ပျော်နေတတ်ခြင်း", "လူမှုဆက်ဆံရေးကောင်းခြင်း"], w: ["အနာဂတ်အတွက် မစီစဉ်ခြင်း"], c: "Actor, Performer, Travel Guide" }
    };

    let idx = 0;
    let scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function initTest() {
        document.getElementById('start').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        renderQ();
    }

    function renderQ() {
        const qData = questions[idx];
        document.getElementById('qText').innerText = qData.q;
        document.getElementById('qCount').innerText = `Question ${idx + 1} of ${questions.length}`;
        document.getElementById('bar').style.width = `${((idx + 1) / questions.length) * 100}%`;
        
        const optArea = document.getElementById('opts');
        optArea.innerHTML = '';
        qData.a.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = opt.t;
            b.onclick = () => {
                for(let key in opt.s) scores[key] += opt.s[key];
                idx++;
                if(idx < questions.length) {
                    renderQ();
                    window.scrollTo(0,0);
                } else showResult();
            };
            optArea.appendChild(b);
        });
    }

    function showResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        const type = (scores.E >= scores.I ? 'E':'I') + (scores.S >= scores.N ? 'S':'N') + (scores.T >= scores.F ? 'T':'F') + (scores.J >= scores.P ? 'J':'P');
        const d = dataMap[type] || dataMap["INTJ"];

        document.getElementById('mbtiType').innerText = type;
        document.getElementById('typeName').innerText = d.name;
        document.getElementById('typeDesc').innerText = d.desc;

        document.getElementById('analysisArea').innerHTML = `
            <div class="analysis-card"><h3>💪 အားသာချက်များ</h3><p style="color:#ccc">${d.s.join(', ')}</p></div>
            <div class="analysis-card" style="border-left-color:#ff4b2b"><h3>⚠️ သတိပြုရန်အချက်များ</h3><p style="color:#ccc">${d.w.join(', ')}</p></div>
            <div class="analysis-card" style="border-left-color:var(--accent-gold)"><h3>💼 သင့်လျော်သော အလုပ်အကိုင်များ</h3><p style="color:#ccc">${d.c}</p></div>
        `;
        window.scrollTo(0,0);
    }
</script>
